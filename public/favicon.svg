<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0c1222"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square with subtle gradient -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>

  <!-- Medical cross symbol (modernized) -->
  <g fill="url(#accentGrad)">
    <!-- Cross center -->
    <rect x="26" y="14" width="12" height="36" rx="2"/>
    <rect x="14" y="26" width="36" height="12" rx="2"/>
  </g>

  <!-- Stylized "10" representing CIM-10 -->
  <g fill="#38bdf8" opacity="0.9">
    <circle cx="48" cy="20" r="4"/>
    <circle cx="48" cy="44" r="4"/>
  </g>

  <!-- Subtle shine effect -->
  <rect x="8" y="8" width="24" height="24" rx="8" fill="#ffffff" opacity="0.08"/>
</svg>
